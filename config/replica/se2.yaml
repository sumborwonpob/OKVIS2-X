# SPDX-License-Identifier: CC0-1.0

general:
  # outputs
  results_directory: "/home/"
  write_mesh_output: true

  # Sensor processing
  sensor_measurement_downsampling: 1
  depth_image_resolution_downsampling: 1
  depth_scaling_factor:       0.00015259

  # Submapping
  submap_kf_threshold:        10
  # submap_kf_threshold:        100000 # For monolithic evaluation
  submap_overlap_ratio:       0.2
  # submap_overlap_ratio:       0.0 # For monolitthic evaluation
  submap_min_frames:          20
  near_plane:                 0.4
  far_plane:                  4.0

  # Alignment settings
  use_map_to_map_factors:  false
  use_map_to_live_factors: false
  n_factors_per_state:     200 # number of points per depth images
  sensor_error:            0.4 # 1-sigma for obsv. noise [m]

  # Network depth settings
  use_uncertainty:         false


map:
  dim:                        [12.8, 12.8, 12.8] # [15., 15., 15.] # [100., 140., 50.]
  res:                        0.05

data:
  # occupancy
  surface_boundary:           0
  min_occupancy:              -100
  max_occupancy:               100
  log_odd_min:                -5.015
  log_odd_max:                 5.015
  fs_integr_scale:            1
  const_surface_thickness:    false
  uncertainty_model:          quadratic
  tau_min_factor:             3
  tau_max_factor:             12
  k_tau:                      0.01
  sigma_min_factor:           3         # minimum/maximum uncertainty := 3 x sigma_min_factor/sigma_max_factor * voxel_dim
  sigma_max_factor:           12         # minimum/maximum uncertainty := 3 x sigma_min_factor/sigma_max_factor * voxel_dim
  k_sigma:                    0.017